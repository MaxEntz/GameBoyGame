name: Mirror to Epitech

on:
  push:
    branches:
      - main

env:
    TARGET_REPO_URL: 'git@github.com:EpitechPGE2-2025/G-ING-401-MLH-4-1-cartridge-6.git'
    EPITECH_SSH_KEY: ${{ secrets.EPITECH_SSH_KEY }}

jobs:
  mirror:
    if: ${{ !startsWith(github.repository, 'EpitechPGE2-2025') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: ${{ env.TARGET_REPO_URL }}
          ssh_private_key: ${{ env.EPITECH_SSH_KEY }}
